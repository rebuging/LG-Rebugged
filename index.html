<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LG-Rebugged</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#111;color:#eee;padding:20px;max-width:480px;margin:auto;}
h1{color:#5bc0de;font-size:22px;margin-bottom:4px;}
.sub{color:#666;font-size:12px;margin-bottom:16px;}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:16px;margin-bottom:12px;}
.card h2{font-size:12px;color:#777;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
button{padding:12px 16px;border-radius:7px;border:none;font-size:14px;cursor:pointer;font-weight:600;width:100%;margin-top:6px;}
.btn-cert{background:#f39c12;color:#000;font-size:16px;padding:16px;}
.btn-connect{background:#5bc0de;color:#111;}
.btn-install{background:#27ae60;color:#fff;font-size:15px;padding:14px;}
.btn-red{background:#c0392b;color:#fff;}
.btn-gray{background:#252525;color:#eee;border:1px solid #333;}
.row{display:flex;gap:8px;}
.row button{margin:0;}
input{flex:1;padding:10px;border-radius:7px;border:1px solid #333;background:#222;color:#eee;font-size:14px;width:100%;}
#statusBox{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;background:#1a1a1a;border-left:3px solid #444;line-height:1.5;}
#statusBox.ok{border-color:#27ae60;background:#0d1f14;}
#statusBox.err{border-color:#c0392b;background:#1f0d0d;}
#statusBox.warn{border-color:#f39c12;background:#1f1a0d;}
#log{background:#0a0a0a;border-radius:8px;padding:10px;height:120px;overflow-y:auto;font-family:monospace;font-size:11px;color:#5fbf5f;white-space:pre-wrap;}
iframe{display:none;}
</style>
</head>
<body>

<h1>LG-Rebugged</h1>
<p class="sub">TV Console Manager</p>

<div id="statusBox">Not connected</div>

<!-- STEP 1: CERT - same as dangbro's "open cert" button -->
<div class="card">
  <h2>Step 1 — Accept TV Certificate (one time only)</h2>
  <button class="btn-cert" onclick="openCert()">🔐 Open Cert Page in Safari</button>
  <p style="font-size:11px;color:#888;margin-top:8px;line-height:1.5">
    Tap above → Safari opens a page → tap <b>"Show Details"</b> → <b>"visit this website"</b> → come back here
  </p>
</div>

<!-- STEP 2: CONNECT -->
<div class="card">
  <h2>Step 2 — Connect</h2>
  <button class="btn-connect" onclick="connect()">Connect to TV (10.0.0.129)</button>
</div>

<!-- STEP 3: INSTALL -->
<div class="card">
  <h2>Step 3 — Install App</h2>
  <button class="btn-install needsConn" disabled onclick="installIpk()">⬇ Install TV Console Manager</button>
</div>

<!-- CONTROLS -->
<div class="card">
  <h2>Controls</h2>
  <div class="row">
    <button class="btn-gray needsConn" disabled onclick="send('ssap://audio/volumeUp')">Vol +</button>
    <button class="btn-gray needsConn" disabled onclick="send('ssap://audio/volumeDown')">Vol -</button>
    <button class="btn-gray needsConn" disabled onclick="send('ssap://audio/setMute',{mute:true})">Mute</button>
    <button class="btn-red needsConn" disabled onclick="send('ssap://system/turnOff')">Off</button>
  </div>
</div>

<!-- TOAST -->
<div class="card">
  <h2>Toast Message</h2>
  <div class="row" style="margin-bottom:6px">
    <input id="msg" value="Hello from LG-Rebugged!"/>
  </div>
  <button class="btn-gray needsConn" disabled onclick="sendToast()">Send Toast to TV</button>
</div>

<div id="log"></div>
<iframe id="proxy"></iframe>

<script>
var TV_IP   = "10.0.0.129";
var IPK_URL = "https://github.com/rebuging/LG-Rebugged/releases/download/V1.0/IPK.ipk";

function openCert(){
  // Exactly like dangbro's "open cert" button
  window.open("https://"+TV_IP+":3001","_blank");
}

// --- data: iframe proxy (null origin = TV SSAP allows it) ---
var proxyCode = '<scr'+'ipt>var ws=null;window.addEventListener("message",function(e){var m=e.data;if(m.cmd==="open"){try{ws=new WebSocket(m.url);ws.onopen=function(){parent.postMessage({ev:"open"},"*")};ws.onclose=function(){parent.postMessage({ev:"close"},"*")};ws.onerror=function(){parent.postMessage({ev:"error"},"*")};ws.onmessage=function(e){parent.postMessage({ev:"message",data:e.data},"*")}}catch(ex){parent.postMessage({ev:"error",detail:String(ex)},"*")}}else if(m.cmd==="send"&&ws&&ws.readyState===1){ws.send(m.data)}});parent.postMessage({ev:"ready"},"*");<\/scr'+'ipt>';
var proxy = document.getElementById("proxy");
proxy.src = "data:text/html;charset=utf-8,"+encodeURIComponent(proxyCode);

var proxyReady=false, paired=false, msgId=0;

var MANIFEST={
  manifestVersion:1,appVersion:"1.1",
  permissions:["LAUNCH","LAUNCH_WEBAPP","APP_TO_APP","CLOSE",
    "CONTROL_AUDIO","CONTROL_DISPLAY","CONTROL_POWER",
    "READ_INSTALLED_APPS","READ_RUNNING_APPS",
    "WRITE_NOTIFICATION_TOAST","WRITE_NOTIFICATION_ALERT"]
};

function log(m){var el=document.getElementById("log");el.innerHTML+=m+"\n";el.scrollTop=el.scrollHeight;}
function status(m,cls){var el=document.getElementById("statusBox");el.textContent=m;el.className=cls||"";}
function enable(on){document.querySelectorAll(".needsConn").forEach(function(b){b.disabled=!on;});}
function wsSend(o){proxy.contentWindow.postMessage({cmd:"send",data:JSON.stringify(o)},"*");}

window.addEventListener("message",function(e){
  var m=e.data;
  if(m.ev==="ready"){proxyReady=true;}
  else if(m.ev==="open"){
    log("Socket open — sending register...");
    var key=localStorage.getItem("tvkey_"+TV_IP);
    var p={forcePairing:false,pairingType:"PROMPT",manifest:MANIFEST};
    if(key)p["client-key"]=key;
    wsSend({type:"register",id:"register_0",payload:p});
    status("👋 Now accept the pairing prompt on your TV screen...","warn");
  }
  else if(m.ev==="message"){
    var d;try{d=JSON.parse(m.data);}catch(_){return;}
    log("<- "+JSON.stringify(d));
    if(d.type==="registered"){
      if(d.payload&&d.payload["client-key"])
        localStorage.setItem("tvkey_"+TV_IP,d.payload["client-key"]);
      paired=true;
      status("✅ Connected & paired! Ready to install.","ok");
      enable(true);
    }else if(d.type==="error"){
      status("TV error: "+(d.error||JSON.stringify(d)),"err");
    }
  }
  else if(m.ev==="error"){
    status("❌ Connection failed — did you do Step 1 (accept cert)?","err");
    log("Error connecting. Make sure you tapped the orange cert button first.");
  }
  else if(m.ev==="close"){
    status("Disconnected — tap Connect to retry","err");
    paired=false;enable(false);
  }
});

function connect(){
  if(!proxyReady){setTimeout(connect,300);return;}
  paired=false;enable(false);
  log("Connecting wss://"+TV_IP+":3001 ...");
  status("Connecting...","");
  proxy.contentWindow.postMessage({cmd:"open",url:"wss://"+TV_IP+":3001"},"*");
}

function send(uri,payload){
  if(!paired)return;
  var msg={type:"request",id:"req_"+(msgId++),uri:uri,payload:payload||{}};
  log("-> "+JSON.stringify(msg));
  wsSend(msg);
}

function sendToast(){
  send("ssap://system.notifications/createToast",
    {message:document.getElementById("msg").value||"Hello!"});
}

function installIpk(){
  log("Installing: "+IPK_URL);
  status("📦 Installing — watch your TV...","warn");
  // Try the webOS built-in dev installer (works on rooted TVs)
  send("ssap://com.webos.appInstallService/dev/install",{
    id:"com.consolemanager.app",
    ipkUrl:IPK_URL,
    subscribe:true
  });
}
</script>
</body>
</html>
