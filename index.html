<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TV Console Manager</title>
<style>
body{font-family:sans-serif;background:#1e1e1e;color:#eee;padding:20px;max-width:500px;margin:auto;}
h1{color:#5bc0de;font-size:20px;}
h3{margin-top:24px;margin-bottom:8px;font-size:15px;color:#aaa;}
button{background:#333;color:#eee;border:1px solid #555;padding:12px 16px;margin:4px 4px 4px 0;border-radius:4px;cursor:pointer;font-size:15px;}
button:active{background:#555;}
button:disabled{opacity:0.4;}
input{padding:10px;border-radius:4px;border:1px solid #555;background:#2a2a2a;color:#eee;width:100%;box-sizing:border-box;font-size:15px;}
#status{margin:10px 0;padding:8px;border-radius:4px;background:#2a2a2a;font-size:13px;}
#log{background:#111;padding:10px;margin-top:20px;border-radius:4px;height:140px;overflow-y:auto;font-family:monospace;font-size:11px;white-space:pre-wrap;}
.row{display:flex;gap:8px;}
.row input{flex:1;}
</style>
</head>
<body>
<h1>TV Console Manager</h1>

<div class="row">
  <input id="tvIp" placeholder="TV IP" />
  <button onclick="connect()">Connect</button>
</div>
<div id="status">Not connected</div>

<h3>Send Toast Message</h3>
<div class="row">
  <input id="msg" placeholder="Message to show on TV" />
  <button class="needsConn" disabled onclick="sendToast()">Send</button>
</div>

<h3>Controls</h3>
<button class="needsConn" disabled onclick="send('ssap://audio/volumeUp')">Vol +</button>
<button class="needsConn" disabled onclick="send('ssap://audio/volumeDown')">Vol -</button>
<button class="needsConn" disabled onclick="send('ssap://audio/setMute',{mute:true})">Mute</button>
<button class="needsConn" disabled onclick="send('ssap://system/turnOff')">Power Off</button>

<div id="log"></div>

<!-- Hidden iframe with data: URL = null origin = allowed by the TV's SSAP server -->
<iframe id="proxy" style="display:none"></iframe>

<script>
// ---- The proxy code that runs INSIDE the data: iframe ----
const proxyCode = `
<script>
let ws = null;
window.addEventListener('message', function(e){
  const m = e.data;
  if(m.cmd === 'open'){
    try {
      ws = new WebSocket(m.url);
      ws.onopen  = () => parent.postMessage({ev:'open'}, '*');
      ws.onclose = () => parent.postMessage({ev:'close'}, '*');
      ws.onerror = () => parent.postMessage({ev:'error'}, '*');
      ws.onmessage = (evt) => parent.postMessage({ev:'message', data: evt.data}, '*');
    } catch(err){
      parent.postMessage({ev:'error', detail: String(err)}, '*');
    }
  } else if(m.cmd === 'send' && ws && ws.readyState === 1){
    ws.send(m.data);
  }
});
parent.postMessage({ev:'ready'}, '*');
<\/script>`;

const iframe = document.getElementById('proxy');
iframe.src = 'data:text/html;charset=utf-8,' + encodeURIComponent(proxyCode);

let proxyReady = false;
let paired = false;
let msgId = 0;

const manifest = {
  manifestVersion: 1,
  appVersion: "1.1",
  permissions: [
    "LAUNCH","LAUNCH_WEBAPP","APP_TO_APP","CLOSE",
    "CONTROL_AUDIO","CONTROL_DISPLAY","CONTROL_INPUT_JOYSTICK",
    "CONTROL_INPUT_MEDIA_PLAYBACK","CONTROL_POWER",
    "READ_APP_STATUS","READ_CURRENT_CHANNEL","READ_RUNNING_APPS",
    "READ_INSTALLED_APPS","WRITE_NOTIFICATION_TOAST","WRITE_NOTIFICATION_ALERT"
  ]
};

function log(m){
  const el = document.getElementById('log');
  el.innerHTML += m + "\n";
  el.scrollTop = el.scrollHeight;
}
function setStatus(m){ document.getElementById('status').textContent = m; }
function enable(on){ document.querySelectorAll('.needsConn').forEach(b => b.disabled = !on); }
function wsSend(obj){ iframe.contentWindow.postMessage({cmd:'send', data: JSON.stringify(obj)}, '*'); }

// Default the IP field to wherever this page is being served from (i.e. the TV)
window.addEventListener('load', () => {
  const host = location.hostname;
  if(host && host !== 'localhost'){ document.getElementById('tvIp').value = host; }
});

window.addEventListener('message', function(e){
  const m = e.data;
  if(m.ev === 'ready'){ proxyReady = true; }
  else if(m.ev === 'open'){
    log('Socket open, registering...');
    const ip = document.getElementById('tvIp').value.trim();
    const storedKey = localStorage.getItem('tv_key_' + ip);
    const payload = { forcePairing:false, pairingType:'PROMPT', manifest: manifest };
    if(storedKey) payload['client-key'] = storedKey;
    wsSend({ type:'register', id:'register_0', payload: payload });
    setStatus('Waiting for pairing — check the TV screen...');
  }
  else if(m.ev === 'message'){
    let d; try { d = JSON.parse(m.data); } catch(_) { return; }
    log('<- ' + JSON.stringify(d));
    if(d.type === 'registered'){
      const ip = document.getElementById('tvIp').value.trim();
      if(d.payload && d.payload['client-key']){
        localStorage.setItem('tv_key_' + ip, d.payload['client-key']);
      }
      paired = true;
      setStatus('Connected ✓');
      enable(true);
    } else if(d.type === 'error'){
      setStatus('TV error: ' + (d.error || ''));
    }
  }
  else if(m.ev === 'error'){ setStatus('Connection error' + (m.detail ? ': ' + m.detail : '')); }
  else if(m.ev === 'close'){ setStatus('Disconnected'); paired = false; enable(false); }
});

function connect(){
  const ip = document.getElementById('tvIp').value.trim();
  if(!ip){ alert('Enter TV IP'); return; }
  if(!proxyReady){ setStatus('Proxy not ready yet, try again in a second'); return; }
  paired = false;
  enable(false);
  setStatus('Connecting to ws://' + ip + ':3000 ...');
  log('Connecting...');
  iframe.contentWindow.postMessage({cmd:'open', url:'ws://' + ip + ':3000'}, '*');
}

function send(uri, payload={}){
  if(!paired){ alert('Not paired yet'); return; }
  const msg = { type:'request', id:'req_' + (msgId++), uri: uri, payload: payload };
  log('-> ' + JSON.stringify(msg));
  wsSend(msg);
}

function sendToast(){
  const message = document.getElementById('msg').value || 'Hello TV!';
  send('ssap://system.notifications/createToast', { message: message });
}
</script>
</body>
</html>
